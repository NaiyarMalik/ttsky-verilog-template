# Tiny Tapeout project information
project:
  title: "TinyProcessor" # Project title
  author: "Naiyar Malik" # Your name
  discord: "naiyar_" # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description: "Designed a 4-command UART-controlled processor supporting Read, Write, ALU Operation, and ALU No-Operand commands." # One line description of what your project does
  language: "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz: 50000000 # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1" # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module: "tt_um_TinyProcessor_naiyar_"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "SYS_TOP.v"
    - "ALU.v"
    - "RegFile.v"
    - "CLK_GATE.v"
    - "RST_SYNC.v"
    - "ClkDiv.v"
    - "CLKDIV_MUX.v"
    - "UART_RX.v"
    - "UART_TX.v"
    - "uart_rx_fsm.v"
    - "uart_tx_fsm.v"
    - "Serializer.v"
    - "deserializer.v"
    - "data_sampling.v"
    - "edge_bit_counter.v"
    - "parity_calc.v"
    - "parity_chk.v"
    - "stp_chk.v"
    - "strt_chk.v"
    - "SYS_CTRL.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "UART_RX"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "UART_TX"
  uo[1]: "Parity_Error"
  uo[2]: "Framing_Error"
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
